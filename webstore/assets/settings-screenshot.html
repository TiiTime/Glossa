<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Glossa Settings Screenshot</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 1280px;
        height: 800px;
        overflow: hidden;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: linear-gradient(145deg, #11111b 0%, #1e1e2e 45%, #181825 100%);
      }
      .scene {
        width: 1280px;
        height: 800px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }
      .glow {
        position: absolute;
        width: 520px;
        height: 520px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(137, 180, 250, 0.18), transparent 70%);
        top: 120px;
        left: 50%;
        transform: translateX(-50%);
      }
      .caption {
        position: absolute;
        top: 72px;
        left: 0;
        right: 0;
        text-align: center;
        color: #cdd6f4;
        font-size: 34px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      .caption span {
        display: block;
        margin-top: 10px;
        font-size: 18px;
        font-weight: 400;
        color: #a6adc8;
      }
      .popup {
        width: 320px;
        padding: 18px 20px 20px;
        border-radius: 16px;
        background: #1e1e2e;
        border: 1px solid rgba(137, 180, 250, 0.25);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(255, 255, 255, 0.04) inset;
        position: relative;
        z-index: 1;
      }
      .popup h1 {
        margin: 0 0 14px;
        font-size: 20px;
        font-weight: 600;
        color: #89b4fa;
      }
      label {
        display: block;
        margin-bottom: 12px;
        color: #a6adc8;
        font-size: 13px;
      }
      select, input[type="number"] {
        width: 100%;
        margin-top: 6px;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid #45475a;
        background: #313244;
        color: #cdd6f4;
        font-size: 14px;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
      }
      .row input { width: 18px; height: 18px; accent-color: #89b4fa; }
      .row span { color: #cdd6f4; font-size: 14px; }
      button {
        width: 100%;
        margin-top: 6px;
        padding: 10px;
        border: none;
        border-radius: 10px;
        background: #89b4fa;
        color: #1e1e2e;
        font-weight: 600;
        font-size: 14px;
      }
      .hint {
        margin-top: 14px;
        font-size: 12px;
        color: #6c7086;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <div class="scene">
      <div class="glow"></div>
      <div class="caption">
        Simple settings
        <span>Language, hover delay, on/off — done in seconds</span>
      </div>
      <div class="popup">
        <h1>Glossa</h1>
        <label class="row">
          <input type="checkbox" checked />
          <span>Aktiv</span>
        </label>
        <label>
          Übersetzen nach
          <select>
            <option selected>Deutsch</option>
          </select>
        </label>
        <label>
          Hover-Verzögerung (ms)
          <input type="number" value="1000" />
        </label>
        <button type="button">Speichern</button>
        <p class="hint">
          1 Sek. auf Wort oder Markierung → Übersetzung.<br />
          Maus weg → Popup sofort weg.
        </p>
      </div>
    </div>
  </body>
</html>
