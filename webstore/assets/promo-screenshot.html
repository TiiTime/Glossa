<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Glossa Promo</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 1280px;
        height: 800px;
        overflow: hidden;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: linear-gradient(145deg, #11111b 0%, #1e1e2e 42%, #181825 100%);
      }
      .scene {
        width: 1280px;
        height: 800px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        text-align: center;
        padding: 48px;
      }
      .glow {
        position: absolute;
        width: 640px;
        height: 640px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(137, 180, 250, 0.2), transparent 68%);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -54%);
      }
      .glow2 {
        position: absolute;
        width: 420px;
        height: 420px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(166, 227, 161, 0.08), transparent 70%);
        top: 58%;
        left: 52%;
        transform: translate(-50%, -50%);
      }
      .logo {
        width: 200px;
        height: 200px;
        border-radius: 44px;
        margin-bottom: 36px;
        position: relative;
        z-index: 1;
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.45);
      }
      h1 {
        font-size: 72px;
        font-weight: 700;
        color: #cdd6f4;
        letter-spacing: -0.03em;
        position: relative;
        z-index: 1;
      }
      .tagline {
        margin-top: 18px;
        font-size: 32px;
        font-weight: 500;
        color: #89b4fa;
        position: relative;
        z-index: 1;
      }
      .sub {
        margin-top: 22px;
        font-size: 22px;
        color: #a6adc8;
        line-height: 1.5;
        max-width: 720px;
        position: relative;
        z-index: 1;
      }
      .pills {
        margin-top: 40px;
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        justify-content: center;
        position: relative;
        z-index: 1;
      }
      .pill {
        padding: 10px 18px;
        border-radius: 999px;
        background: rgba(137, 180, 250, 0.1);
        border: 1px solid rgba(137, 180, 250, 0.28);
        color: #bac2de;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div class="scene">
      <div class="glow"></div>
      <div class="glow2"></div>
      <img class="logo" src="glossa-logo-source.png" alt="Glossa" />
      <h1>Glossa</h1>
      <p class="tagline">Hover any word — translate instantly</p>
      <p class="sub">Lightweight hover translator for Brave &amp; Chrome.<br />80+ languages · Free &amp; open source by Tii</p>
      <div class="pills">
        <span class="pill">1 sec hover</span>
        <span class="pill">Text selection</span>
        <span class="pill">Shadow DOM popup</span>
      </div>
    </div>
  </body>
</html>
